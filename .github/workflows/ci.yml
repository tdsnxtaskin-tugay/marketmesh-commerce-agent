name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest python-dotenv

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

      - name: Smoke-test the offline demo
        run: |
          python scripts/run_demo.py status
          python scripts/run_demo.py --mode single --no-live-vendor
          python scripts/run_demo.py --mode crew

      - name: Validate M365 appPackage JSON
        run: |
          python - <<'PY'
          import json, pathlib
          for name in ["manifest.json", "declarativeAgent.json", "ai-plugin.json"]:
              p = pathlib.Path("appPackage") / name
              json.loads(p.read_text(encoding="utf-8"))
              print("OK", p)
          PY

      - name: Compliance scan (no company / secret leakage)
        run: |
          echo "Scanning for forbidden terms…"
          if grep -rniE "digitalfoundation|techdata|td synnex|tdsynnex|ai_common_lib|techdatacorp|sk-[A-Za-z0-9]{16,}|ghp_[A-Za-z0-9]{20,}" \
              --include="*.py" --include="*.json" --include="*.md" --include="*.yaml" --include="*.yml" --exclude=ci.yml . ; then
            echo "::error::Forbidden term found"; exit 1
          fi
          echo "Clean."
